events {
}

http {
    server {
        listen 80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Todas las peticiones pasan por esta ruta primero menos a las que tienen off
        auth_request /auth-verify;

        # Las cabeceras devueltas por Auth serán leídas por nginx como
        # El header X-User-ID se expone en nginx como $upstream_http_x_user_id
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_rol $upstream_http_x_user_rol;

        # Inyecta los headers al servicio destino
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Rol $user_rol;

        # ========== AUTH SERVICE ==========
        
        # Login público (sin auth)
        location /usuario/login/ {
            auth_request off; 
            proxy_pass http://usuarios_app:8000/usuario/login/;
        }

        # Proxy para todas las rutas de usuario hacia el servicio de usuarios
        location /usuario/ {
            # Dejar que auth_request evalúe la subrequest /auth-verify
            proxy_pass http://usuarios_app:8000/usuario/;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Verify (para nginx auth_request) - público
        location = /auth-verify {
            internal;
            # Forzar Host válido para Django (evita valores con guiones bajos)
            proxy_set_header Host localhost;
            proxy_pass http://usuarios_app:8000/usuario/verify/;
            proxy_pass_request_body off;
            proxy_set_header X-Original-URI $request_uri;
            # El nombre de variable correcto es $http_authorization (minusculas)
            #proxy_set_header Authorization $http_authorization;
        }

        # ========== SERVICIOS PROTEGADOS ==========

        # Inventario
        #location /api/inventario/ {
        #    proxy_pass http://servicio-inventario:8001/api/inventario/;
        #}

        # Catálogo
        #location /api/catalogo/ {
        #    proxy_pass http://servicio-catalogo:8002/api/catalogo/;
        #}

        # Calidad
        #location /api/calidad/ {
        #    proxy_pass http://servicio-calidad:8003/api/calidad/;
        #}

        # Alertas
        #location /api/alertas/ {
        #    proxy_pass http://servicio-alertas:8004/api/alertas/;
        #}

        # Reportes
        #location /api/reportes/ {
        #    proxy_pass http://servicio-reportes:8005/api/reportes/;
        #}
    }
}