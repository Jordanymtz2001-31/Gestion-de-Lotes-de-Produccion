# events es Obligatorio y define como manejo las conexiones simultaneas
# Estar vacio significa que uso los valores por defecto
#Bien para el desarrollo
events {
}

http {
    server {
        # Definimos el DNS interno de Docker para que Nginx sepa donde buscar
        # Esto para evitar que si un servicio no esta corriendo no falle el Apigateway
        resolver 127.0.0.11 valid=30s;

        # Le decimos a nginx que escuhe en el puerto 80
        listen 80;

        # Estos dos headers se inyectan en todas las peticiones que Nginx reenvia a los servicios 
        # El host le dice al servicio destino cual era el dominio original de la peticion
        # El X-Real-IP  le dice la IP real del cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Indicamos a Nginx que antes de procesar cualquier peticion, haga un subrequest (subpeticion :Dispara esta peticion interna hacia el microservicio de Usuario/Auth)
        # Si esa peticion devuelve un 200, deja pasarlo, de lo contrario devuelve un 401 y lo bloquea
        auth_request /auth-verify;

        # Despues de que /auth-Verify responder con 200, Nginx lee los headers que devolvio (X-User-Id y X-User-Rol)
        # Y los guardamos en variables internas de Nginx ($user_id y user_rol)
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_rol $upstream_http_x_user_rol;

        # Tomamos las variables que acabamos de guardar y las inyectamos como headers en la peticion que va al servicio destino
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Rol $user_rol;

        # ========== AUTH SERVICE ==========
        
        # Login público (sin auth)
        location /usuario/login/ {
            # Usamos una variable para que Nginx no busque "usuarios_app" al arrancar
            set $upstream_usuario usuarios_app;
            # Desactivamos la vefiricacion del token para esta ruta especifica
            auth_request off; 
            proxy_pass http://$upstream_usuario:8000/usuario/login/;
        }

        # Proxy para todas las rutas de usuario hacia el servicio de usuarios
        location /usuario/ {
            # Usamos una variable para que Nginx no busque "usuarios_app" al arrancar
            set $upstream_usuario usuarios_app;
            # Dejar que auth_request evalúe la subrequest /auth-verify
            proxy_pass http://$upstream_usuario:8000$request_uri;  # contiene la URI original completa incluyendo el path y query string
            # Evita que Django rechace la peticion por un ALLOWED_HOST que no reconoce el nombre del contenedor
            proxy_set_header Host $http_host;
            # El X-Real-IP  le dice la IP real del cliente
            proxy_set_header X-Real-IP $remote_addr;
            # Acumula la cadena de IPs por las que paso la peticion - util cuando hay multiples poxies
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            #Inyectamos
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        #Si el servicio de usuario esta caido retornamos este mensaje
        #error_page 401 = @error401;
        #location @error401 {
        #    return 401 '{"error": "No autorizado o token inválido"}';
        #    add_header Content-Type application/json;
        #}


        # Verify (para nginx auth_request) - público
        location = /auth-verify {
            # internal: Evita que alguien llame ese endpoint directamente desde fuera
            internal; 
            
            # Usamos una variable para que Nginx no busque "usuarios_app" al arrancar
            set $upstream_usuario usuarios_app;
            
            # FORZA EL MÉTODO A GET PARA LA VALIDACIÓN
            proxy_method GET;
            # Forzar Host válido para Django (evita valores con guiones bajos)
            proxy_set_header Host $http_host;
            proxy_pass http://$upstream_usuario:8000/usuario/verify/;
            #proxy_pass http://$upstream_usuario:8000;
            # La subrequest no necesita mandar el body de la peticion original, solo el header de Authorization
            proxy_pass_request_body off;
            # Necesario por que proxy_pass_request_body off vacia el body pero no limpia ese header
            proxy_set_header Content-Length "";
            # Le dice a la vista de VerifyView cual era la URL original que se intentaba acceder.
            proxy_set_header X-Original-URI $request_uri;
            # Pasar el header de Authorization a la subrequest
            proxy_set_header Authorization $http_authorization;
        }
        
        #Esto te servirá mucho en la nube para verificar que el contenedor subió bien.
        location /health {
            auth_request off;
            return 200 'Gateway esta vivo!';
        }

        # ========== SERVICIOS PROTEGADOS ==========

        # Producto
        location /productos/ {

            # Usamos una variable para que Nginx no busque "producto_app" al arrancar
            set $upstream_producto producto_app;
            proxy_pass http://$upstream_producto:8001$request_uri;  # contiene la URI original completa incluyendo el path y query string

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Rol $user_rol;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proveedor
        location /proveedores/ {

            # Usamos una variable para que Nginx no busque "proveedor_app" al arrancar
            set $upstream_proveedor proveedor_app;
            proxy_pass http://$upstream_proveedor:8002$request_uri;  # contiene la URI original completa incluyendo el path y query string

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Rol $user_rol;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Inventario (Lote)
        location /lotes/ {
            
            # Usamos una variable para que Nginx no busque "inventario_app" al arrancar
            set $upstream_inventario inventario_app;
            proxy_pass http://$upstream_inventario:8003$request_uri;  # contiene la URI original completa incluyendo el path y query string

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Rol $user_rol;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Inventario
        #location /api/inventario/ {
        #    proxy_pass http://servicio-inventario:8001/api/inventario/;
        #}

        # Calidad
        #location /api/calidad/ {
        #    proxy_pass http://servicio-calidad:8003/api/calidad/;
        #}

        # Alertas
        #location /api/alertas/ {
        #    proxy_pass http://servicio-alertas:8004/api/alertas/;
        #}

        # Reportes
        #location /api/reportes/ {
        #    proxy_pass http://servicio-reportes:8005/api/reportes/;
        #}
    }
}